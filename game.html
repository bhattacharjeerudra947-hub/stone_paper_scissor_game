<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stone paper scissor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="setting-container">
    <div class="setting">
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="settings-menu">
        <div class="menu-item">
           
           
            <div class="sound-control">
                 <i class="fa-solid fa-volume-high"  id="volumeIcon"></i>
                  <span> Sound</span>
                
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                
            </div>
            <div class="sound">
            <audio id="bgAudio" src="game normal sounnd.mp3" autoplay loop></audio>
            </div>
        </div>

        <div class="menu-item about">
            <i class="fa-solid fa-circle-info"></i>
            
            
            <span>About</span>
            <div class="link" >
                <p>This is created by Rudra Bhattacharjee</p>
            </div>
            <div class="link">
                <a href="https://github.com/bhattacharjeerudra947-hub" target="_blank" style="color: aliceblue;">
                <i class="fa-brands fa-github"></i> GitHub
                </a>

                <a href="https://www.linkedin.com/in/rudra-bhattacharjee-7a6457344" target="_blank" style="color: #0a66c2;">
                <i class="fa-brands fa-linkedin"></i> LinkedIn
                </a>
            </div>
        </div>
    </div>

</div>
    <div class="homepage">
        <div class="heading"><span>Rock Paper Scissor </span>

        </div>
        
        
        
            <div class="videos">
                <span>
                <video autoplay loop muted>
                <source src="rock-paper-scissors-nickelodeon.mp4" type="video/mp4">
                 </video>
                </span>
            </div>
        
        <div class="playerDetail">
        <form>

            <input type="text" id="playerName"placeholder="Enter your name">
            <button type="submit">Submit</button>
        </form>
        </div>
        <div class="startGame">
            <button class="gameStart">Start</button>
        </div>

    </div>

    <div class="gameContainer">
        <span>Welcome </span>
        
        <div class="newGame"><button>New Game</button></div>
        <div class="scorecard"></div>
        <div class="playerChoice"></div>
        <div class="winnerMessage"></div>
    </div>

        
    <script src="script.js"></script>
</body>
</html>
